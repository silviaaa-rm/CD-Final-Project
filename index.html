<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>HR Intelligence — Predictive Tool</title>

  <!-- Íconos -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>

  <!-- Librerías para PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #faf5ff;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #1a1a2e;
    }

    .app {
      max-width: 1050px;
      margin: 0 auto;
    }

    .header {
      background: #f3e8ff;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid #d8b4fe;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: #c084fc;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon i {
      font-size: 22px;
      color: #581c87;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #581c87;
    }

    .header-sub {
      font-size: 13px;
      color: #7e22ce;
      margin-top: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: #fff;
      border: 1px solid #e9d5ff;
      border-radius: 16px;
      padding: 1.25rem;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    .result-panel {
      min-height: 460px;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .field select,
    .field input[type=number] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e9d5ff;
      border-radius: 8px;
      font-size: 13px;
      background: #faf5ff;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s;
    }

    .field select:focus,
    .field input[type=number]:focus {
      border-color: #a855f7;
    }

    .btn-run,
    .btn-pdf {
      width: 100%;
      margin-top: 1rem;
      padding: 11px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-run {
      background: #a855f7;
    }

    .btn-run:hover {
      background: #9333ea;
    }

    .btn-pdf {
      display: none;
      background: #7c3aed;
      margin-top: 10px;
    }

    .btn-pdf:hover {
      background: #6d28d9;
    }

    .btn-run:active,
    .btn-pdf:active {
      transform: scale(0.98);
    }

    .btn-run:disabled {
      background: #d8b4fe;
      cursor: not-allowed;
    }

    .placeholder {
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      padding: 2rem;
      gap: 8px;
    }

    #reportExport {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      background: white;
      padding: 18px;
      border-radius: 14px;
    }

    .result-title-pdf {
      font-size: 18px;
      font-weight: 700;
      color: #581c87;
      margin-bottom: 4px;
    }

    .result-subtitle-pdf {
      font-size: 12px;
      color: #7e22ce;
      margin-bottom: 14px;
    }

    .pdf-divider {
      height: 1px;
      background: #f3e8ff;
      margin: 14px 0;
    }

    .summary-box {
      margin-bottom: 1rem;
      padding: 12px;
      border: 1px solid #e9d5ff;
      border-radius: 12px;
      background: #faf5ff;
    }

    .summary-title {
      font-size: 13px;
      font-weight: 600;
      color: #7e22ce;
      margin-bottom: 8px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 12px;
      color: #374151;
    }

    .summary-grid strong {
      color: #111827;
    }

    .warning-box {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      color: #92400e;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .warning-box strong {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .warning-box ul {
      margin-left: 18px;
    }

    .prediction-main {
      text-align: center;
      margin: 14px 0 8px;
    }

    .prediction-title {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .prediction-badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
      border: 1px solid;
    }

    .prediction-stay {
      background: #d1fae5;
      color: #065f46;
      border-color: #6ee7b7;
    }

    .prediction-leave {
      background: #fce7f3;
      color: #9d174d;
      border-color: #f9a8d4;
    }

    .risk-note {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    .gauge-container {
      text-align: center;
      margin: 18px 0 18px;
    }

    .donut-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .donut-svg {
      display: block;
    }

    .donut-bg {
      fill: none;
      stroke: #f3e8ff;
      stroke-width: 14;
    }

    .donut-progress {
      fill: none;
      stroke-width: 14;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 80px 80px;
    }

    .donut-center {
      font-size: 24px;
      font-weight: 700;
      fill: #111827;
    }

    .donut-sub {
      font-size: 12px;
      fill: #6b7280;
    }

    .prob-label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }

    .prob-section {
      width: 100%;
      margin-bottom: 1rem;
    }

    .prob-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .prob-row span:last-child {
      font-weight: 600;
      color: #1a1a2e;
    }

    .prob-bar-wrap {
      width: 100%;
      height: 9px;
      background: #f3e8ff;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .prob-bar {
      height: 100%;
      border-radius: 999px;
    }

    .rec-title {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .rec-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .rec-item.pink {
      background: #fdf2f8;
      border: 1px solid #f3b8e9;
    }

    .rec-item.green {
      background: #f0fdf4;
      border: 1px solid #86efac;
    }

    .rec-item.lila {
      background: #f5f3ff;
      border: 1px solid #c4b5fd;
    }

    .rec-item i {
      font-size: 18px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .rec-item.pink i {
      color: #be185d;
    }

    .rec-item.green i {
      color: #15803d;
    }

    .rec-item.lila i {
      color: #6d28d9;
    }

    .rec-item strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .rec-item span {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="header-icon">
      <i class="ti ti-users"></i>
    </div>

    <div>
      <div class="header-title">HR Intelligence — Predictive Tool</div>
      <div class="header-sub">Ingresa los datos del empleado para obtener la predicción del modelo</div>
    </div>
  </div>

  <div class="grid">

    <div class="panel">
      <div class="panel-title">Employee profile variables</div>

      <div class="fields-grid">
        <div class="field">
          <label>Education</label>
          <select id="education">
            <option value="0">Bachelors</option>
            <option value="1">Masters</option>
            <option value="2">PHD</option>
          </select>
        </div>

        <div class="field">
          <label>Joining Year</label>
          <input type="number" id="joiningYear" value="2016" />
        </div>

        <div class="field">
          <label>City</label>
          <select id="city">
            <option value="Bangalore">Bangalore</option>
            <option value="New Delhi">New Delhi</option>
            <option value="Pune">Pune</option>
          </select>
        </div>

        <div class="field">
          <label>Payment Tier</label>
          <select id="paymentTier">
            <option value="1">1 — Entry</option>
            <option value="2">2 — Mid</option>
            <option value="3" selected>3 — Senior</option>
          </select>
        </div>

        <div class="field">
          <label>Age</label>
          <input type="number" id="age" value="30" />
        </div>

        <div class="field">
          <label>Gender</label>
          <select id="gender">
            <option value="0">Female</option>
            <option value="1">Male</option>
          </select>
        </div>

        <div class="field">
          <label>Ever Benched</label>
          <select id="everBenched">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>

        <div class="field">
          <label>Experience (years)</label>
          <input type="number" id="experience" value="3" />
        </div>
      </div>

      <button class="btn-run" id="btnRun" onclick="runPrediction()">
        <i class="ti ti-cpu"></i> Run Prediction
      </button>

      <button class="btn-pdf" id="btnPdf" onclick="downloadPDF()">
        <i class="ti ti-file-download"></i> Descargar PDF
      </button>
    </div>

    <div class="panel result-panel">
      <div class="panel-title">LeaveOrNot prediction</div>

      <div id="resultContent">
        <div class="placeholder">
          <i class="ti ti-arrow-left"></i> Ingresa los datos y presiona Run Prediction
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  let lastEmployeeData = null;
  let lastPredictionResult = null;

  async function runPrediction() {
    const btn = document.getElementById('btnRun');

    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader"></i> Analizando...';

    document.getElementById('resultContent').innerHTML =
      '<div class="placeholder"><i class="ti ti-loader"></i> Procesando predicción...</div>';

    document.getElementById("btnPdf").style.display = "none";

    const education = parseInt(document.getElementById('education').value);
    const city = document.getElementById('city').value;
    const paymentTier = parseInt(document.getElementById('paymentTier').value);
    const gender = parseInt(document.getElementById('gender').value);
    const everBenched = parseInt(document.getElementById('everBenched').value);

    const joiningYear = parseInt(document.getElementById('joiningYear').value);
    const age = parseInt(document.getElementById('age').value);
    const experience = parseInt(document.getElementById('experience').value);

    if (isNaN(joiningYear) || joiningYear <= 0) {
      showError("Joining Year debe ser un número mayor a 0.");
      resetButton(btn);
      return;
    }

    if (isNaN(age) || age <= 0) {
      showError("Age debe ser un número mayor a 0.");
      resetButton(btn);
      return;
    }

    if (isNaN(experience) || experience < 0) {
      showError("Experience debe ser un número igual o mayor a 0.");
      resetButton(btn);
      return;
    }

    const employeeData = {
      Education: education,
      JoiningYear: joiningYear,
      City: city,
      PaymentTier: paymentTier,
      Age: age,
      Gender: gender,
      EverBenched: everBenched,
      ExperienceInCurrentDomain: experience
    };

    lastEmployeeData = employeeData;

    try {
      const res = await fetch("/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(employeeData)
      });

      const result = await res.json();

      if (!res.ok) {
        showError(result.error || "Ocurrió un error al hacer la predicción.");
        resetButton(btn);
        return;
      }

      renderResult(result);

    } catch (error) {
      showError("No se pudo conectar con Flask. Revisa que app.py esté ejecutándose.");
    }

    resetButton(btn);
  }

  function resetButton(btn) {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-cpu"></i> Run Prediction';
  }

  function showError(message) {
    document.getElementById('resultContent').innerHTML =
      `<div class="placeholder" style="color:#dc2626;">${message}</div>`;
  }

  function buildWarningsHtml(warnings) {
    if (!warnings || warnings.length === 0) {
      return "";
    }

    const items = warnings.map(w => `<li>${w}</li>`).join("");

    return `
      <div class="warning-box">
        <strong>⚠️ Advertencia</strong>
        <ul>${items}</ul>
      </div>
    `;
  }

  function renderResult(r) {
    lastPredictionResult = r;
    document.getElementById("btnPdf").style.display = "flex";

    const probLeave = Math.round(r.prob_leave * 100);
    const probStay = Math.round(r.prob_stay * 100);

    const leaving = r.prediction === 1;

    const predictionText = leaving ? "Leave" : "Stay";
    const predictionClass = leaving ? "prediction-leave" : "prediction-stay";

    const dominantPercent = leaving ? probLeave : probStay;
    const dominantLabel = leaving ? "Leave" : "Stay";

    const riskLabel = leaving
      ? (probLeave > 70 ? "High Risk" : "Medium Risk")
      : "Low Risk";

    const gaugeColor = leaving
      ? (probLeave > 70 ? "#ec4899" : "#f59e0b")
      : "#10b981";

    const factors = r.main_factors || [];
    const warningsHtml = buildWarningsHtml(r.warnings);

    const recColors = ['pink', 'green', 'lila'];
    const recIcons = ['ti-message-circle', 'ti-currency-dollar', 'ti-arrows-exchange'];

    const recTitles = leaving
      ? ['Stay Interview', 'Review Compensation', 'Growth Plan']
      : ['Periodic Follow-up', 'Maintain Conditions', 'Recognition'];

    const recsHtml = factors.map((f, i) => `
      <div class="rec-item ${recColors[i] || 'lila'}">
        <i class="ti ${recIcons[i] || 'ti-info-circle'}"></i>
        <div>
          <strong>${recTitles[i] || 'Recommendation'}</strong>
          <span>${f}</span>
        </div>
      </div>
    `).join('');

    const educationText = ["Bachelors", "Masters", "PHD"][lastEmployeeData.Education];
    const genderText = lastEmployeeData.Gender === 1 ? "Male" : "Female";
    const benchedText = lastEmployeeData.EverBenched === 1 ? "Yes" : "No";

    const radius = 54;
    const circumference = 2 * Math.PI * radius;
    const strokeOffset = circumference * (1 - dominantPercent / 100);

    document.getElementById('resultContent').innerHTML = `
      <div id="reportExport">

        <div class="result-title-pdf">HR Intelligence — Predictive Report</div>
        <div class="result-subtitle-pdf">Employee Leave Prediction Summary</div>

        ${warningsHtml}

        <div class="summary-box">
          <div class="summary-title">Employee Data Summary</div>

          <div class="summary-grid">
            <div><strong>Education:</strong> ${educationText}</div>
            <div><strong>Joining Year:</strong> ${lastEmployeeData.JoiningYear}</div>
            <div><strong>City:</strong> ${lastEmployeeData.City}</div>
            <div><strong>Payment Tier:</strong> ${lastEmployeeData.PaymentTier}</div>
            <div><strong>Age:</strong> ${lastEmployeeData.Age}</div>
            <div><strong>Gender:</strong> ${genderText}</div>
            <div><strong>Ever Benched:</strong> ${benchedText}</div>
            <div><strong>Experience:</strong> ${lastEmployeeData.ExperienceInCurrentDomain}</div>
          </div>
        </div>

        <div class="pdf-divider"></div>

        <div class="prediction-main">
          <div class="prediction-title">Main prediction</div>
          <span class="prediction-badge ${predictionClass}">${predictionText}</span>
          <div class="risk-note">Risk level: ${riskLabel}</div>
        </div>

        <div class="gauge-container">
          <div class="donut-wrap">
            <svg class="donut-svg" width="160" height="160" viewBox="0 0 160 160">
              <circle class="donut-bg" cx="80" cy="80" r="${radius}"></circle>

              <circle
                class="donut-progress"
                cx="80"
                cy="80"
                r="${radius}"
                stroke="${gaugeColor}"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${strokeOffset}">
              </circle>

              <text x="80" y="76" text-anchor="middle" class="donut-center">${dominantPercent}%</text>
              <text x="80" y="102" text-anchor="middle" class="donut-sub">${dominantLabel}</text>
            </svg>
          </div>

          <p class="prob-label">Highest probability</p>
        </div>

        <div class="prob-section">
          <div class="prob-row">
            <span>Stay</span>
            <span>${probStay}%</span>
          </div>

          <div class="prob-bar-wrap">
            <div class="prob-bar" style="width:${probStay}%; background:#10b981;"></div>
          </div>

          <div class="prob-row">
            <span>Leave</span>
            <span>${probLeave}%</span>
          </div>

          <div class="prob-bar-wrap">
            <div class="prob-bar" style="width:${probLeave}%; background:#ec4899;"></div>
          </div>
        </div>

        <div>
          <div class="rec-title">Strategic recommendations</div>
          ${recsHtml}
        </div>
      </div>
    `;
  }

  async function downloadPDF() {
  const { jsPDF } = window.jspdf;

  if (!lastEmployeeData || !lastPredictionResult) {
    alert("Primero genera una predicción antes de descargar el PDF.");
    return;
  }

  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const margin = 10;
  const contentWidth = pageWidth - margin * 2;

  const probLeave = Math.round(lastPredictionResult.prob_leave * 100);
  const probStay = Math.round(lastPredictionResult.prob_stay * 100);

  const leaving = lastPredictionResult.prediction === 1;

  const predictionText = leaving ? "Leave" : "Stay";
  const dominantPercent = leaving ? probLeave : probStay;
  const dominantLabel = leaving ? "Leave" : "Stay";

  const riskLabel = leaving
    ? (probLeave > 70 ? "High Risk" : "Medium Risk")
    : "Low Risk";

  const educationText = ["Bachelors", "Masters", "PHD"][lastEmployeeData.Education];
  const genderText = lastEmployeeData.Gender === 1 ? "Male" : "Female";
  const benchedText = lastEmployeeData.EverBenched === 1 ? "Yes" : "No";

  const recommendations = lastPredictionResult.main_factors || [];
  const warnings = lastPredictionResult.warnings || [];

  let y = 10;

  // ============================================================
  // Funciones auxiliares
  // ============================================================

  function sectionTitle(text, posY) {
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(11);
    pdf.setTextColor(156, 163, 175);
    pdf.text(text.toUpperCase(), margin, posY);
  }

  function drawRoundedBox(x, y, w, h, fillColor, borderColor) {
    pdf.setFillColor(...fillColor);
    pdf.setDrawColor(...borderColor);
    pdf.roundedRect(x, y, w, h, 4, 4, "FD");
  }

  function drawProgressBar(label, value, color, posY) {
    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(10);
    pdf.setTextColor(75, 85, 99);

    pdf.text(label, margin, posY);
    pdf.text(`${value}%`, pageWidth - margin, posY, { align: "right" });

    const barY = posY + 3;
    const barWidth = contentWidth;
    const barHeight = 4;

    // fondo
    pdf.setFillColor(243, 232, 255);
    pdf.roundedRect(margin, barY, barWidth, barHeight, 2, 2, "F");

    // progreso
    pdf.setFillColor(...color);
    pdf.roundedRect(margin, barY, barWidth * (value / 100), barHeight, 2, 2, "F");
  }

  function recommendationTitle(index, leaving) {
    if (index === 0) return leaving ? "Stay Interview" : "Periodic Follow-up";
    if (index === 1) return leaving ? "Review Compensation" : "Maintain Conditions";
    return leaving ? "Growth Plan" : "Recognition";
  }

  function recommendationColors(index) {
    if (index === 0) {
      return {
        fill: [253, 242, 248],
        border: [243, 184, 233]
      };
    }
    if (index === 1) {
      return {
        fill: [240, 253, 244],
        border: [134, 239, 172]
      };
    }
    return {
      fill: [245, 243, 255],
      border: [196, 181, 253]
    };
  }

  // ============================================================
  // ENCABEZADO
  // ============================================================

  drawRoundedBox(margin, y, contentWidth, 20, [243, 232, 255], [216, 180, 254]);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(15);
  pdf.setTextColor(88, 28, 135);
  pdf.text("HR Intelligence — Predictive Report", margin + 8, y + 8);

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(9);
  pdf.setTextColor(126, 34, 206);
  pdf.text("Employee Leave Prediction Summary", margin + 8, y + 14);

  y += 28;

  // ============================================================
  // SUMMARY
  // ============================================================

  drawRoundedBox(margin, y, contentWidth, 40, [250, 245, 255], [233, 213, 255]);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(11);
  pdf.setTextColor(126, 34, 206);
  pdf.text("Employee Data Summary", margin + 6, y + 8);

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(9);
  pdf.setTextColor(55, 65, 81);

  const leftX = margin + 6;
  const rightX = margin + 105;

  pdf.text(`Education: ${educationText}`, leftX, y + 16);
  pdf.text(`Joining Year: ${lastEmployeeData.JoiningYear}`, rightX, y + 16);

  pdf.text(`City: ${lastEmployeeData.City}`, leftX, y + 23);
  pdf.text(`Payment Tier: ${lastEmployeeData.PaymentTier}`, rightX, y + 23);

  pdf.text(`Age: ${lastEmployeeData.Age}`, leftX, y + 30);
  pdf.text(`Gender: ${genderText}`, rightX, y + 30);

  pdf.text(`Ever Benched: ${benchedText}`, leftX, y + 37);
  pdf.text(`Experience: ${lastEmployeeData.ExperienceInCurrentDomain}`, rightX, y + 37);

  y += 50;

  // ============================================================
  // WARNINGS
  // ============================================================

  if (warnings.length > 0) {
    let warningHeight = 14;

    warnings.forEach(w => {
      const lines = pdf.splitTextToSize(`• ${w}`, 170);
      warningHeight += lines.length * 4.5;
    });

    drawRoundedBox(margin, y, contentWidth, warningHeight, [254, 243, 199], [252, 211, 77]);

    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(10);
    pdf.setTextColor(146, 64, 14);
    pdf.text("Advertencia", margin + 6, y + 7);

    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(8.5);

    let wy = y + 13;
    warnings.forEach(w => {
      const lines = pdf.splitTextToSize(`• ${w}`, 172);
      pdf.text(lines, margin + 6, wy);
      wy += lines.length * 4.5 + 1;
    });

    y += warningHeight + 8;
  }

  // ============================================================
  // MAIN PREDICTION
  // ============================================================

  sectionTitle("Main Prediction", y);
  y += 6;

  // Caja izquierda: predicción
  const leftBoxX = margin;
  const leftBoxY = y;
  const leftBoxW = 88;
  const leftBoxH = 26;

  const predFill = leaving ? [252, 231, 243] : [209, 250, 229];
  const predBorder = leaving ? [249, 168, 212] : [110, 231, 183];
  const predText = leaving ? [157, 23, 77] : [6, 95, 70];

  drawRoundedBox(leftBoxX, leftBoxY, leftBoxW, leftBoxH, predFill, predBorder);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(10);
  pdf.setTextColor(107, 114, 128);
  pdf.text("Prediction", leftBoxX + 6, leftBoxY + 8);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(16);
  pdf.setTextColor(...predText);
  pdf.text(predictionText, leftBoxX + 6, leftBoxY + 18);

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(9);
  pdf.setTextColor(75, 85, 99);
  pdf.text(`Risk level: ${riskLabel}`, leftBoxX + 40, leftBoxY + 18);

  // Caja derecha: porcentaje dominante
  const rightBoxX = margin + 95;
  const rightBoxY = y;
  const rightBoxW = contentWidth - 95;
  const rightBoxH = 26;

  drawRoundedBox(rightBoxX, rightBoxY, rightBoxW, rightBoxH, [255, 255, 255], [233, 213, 255]);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(10);
  pdf.setTextColor(107, 114, 128);
  pdf.text("Highest probability", rightBoxX + 6, rightBoxY + 8);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(18);
  pdf.setTextColor(17, 24, 39);
  pdf.text(`${dominantPercent}%`, rightBoxX + 6, rightBoxY + 18);

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(9);
  pdf.setTextColor(75, 85, 99);
  pdf.text(dominantLabel, rightBoxX + 30, rightBoxY + 18);

  y += 36;

  // ============================================================
  // PROBABILITIES
  // ============================================================

  sectionTitle("Probability Breakdown", y);
  y += 8;

  drawProgressBar("Stay", probStay, [16, 185, 129], y);
  y += 16;

  drawProgressBar("Leave", probLeave, [236, 72, 153], y);
  y += 18;

  // ============================================================
  // RECOMMENDATIONS
  // ============================================================

  sectionTitle("Strategic Recommendations", y);
  y += 8;

  recommendations.forEach((rec, index) => {
    const title = recommendationTitle(index, leaving);
    const colors = recommendationColors(index);

    const lines = pdf.splitTextToSize(rec, 175);
    const boxHeight = 12 + lines.length * 4.5;

    if (y + boxHeight > 280) {
      pdf.addPage();
      y = 15;
      sectionTitle("Strategic Recommendations", y);
      y += 8;
    }

    drawRoundedBox(margin, y, contentWidth, boxHeight, colors.fill, colors.border);

    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(9.5);
    pdf.setTextColor(17, 24, 39);
    pdf.text(title, margin + 6, y + 7);

    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(8.5);
    pdf.setTextColor(107, 114, 128);
    pdf.text(lines, margin + 6, y + 13);

    y += boxHeight + 6;
  });

  // ============================================================
  // FOOTER
  // ============================================================

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(8);
  pdf.setTextColor(156, 163, 175);
  pdf.text(`Generated on: ${new Date().toLocaleString()}`, margin, 288);

  pdf.save("employee_prediction_report.pdf");
}
</script>
</body>
</html>
