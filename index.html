<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>HR Intelligence — Predictive Tool</title>

  <!-- Íconos -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>

  <!-- Librerías para PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #faf5ff;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #1a1a2e;
    }

    .app {
      max-width: 1050px;
      margin: 0 auto;
    }

    .header {
      background: #f3e8ff;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid #d8b4fe;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: #c084fc;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon i {
      font-size: 22px;
      color: #581c87;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #581c87;
    }

    .header-sub {
      font-size: 13px;
      color: #7e22ce;
      margin-top: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: #fff;
      border: 1px solid #e9d5ff;
      border-radius: 16px;
      padding: 1.25rem;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    .result-panel {
      min-height: 460px;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .field select,
    .field input[type=number] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e9d5ff;
      border-radius: 8px;
      font-size: 13px;
      background: #faf5ff;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s;
    }

    .field select:focus,
    .field input[type=number]:focus {
      border-color: #a855f7;
    }

    .btn-run,
    .btn-pdf {
      width: 100%;
      margin-top: 1rem;
      padding: 11px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-run {
      background: #a855f7;
    }

    .btn-run:hover {
      background: #9333ea;
    }

    .btn-pdf {
      display: none;
      background: #7c3aed;
      margin-top: 10px;
    }

    .btn-pdf:hover {
      background: #6d28d9;
    }

    .btn-run:active,
    .btn-pdf:active {
      transform: scale(0.98);
    }

    .btn-run:disabled {
      background: #d8b4fe;
      cursor: not-allowed;
    }

    .placeholder {
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      padding: 2rem;
      gap: 8px;
    }

    #reportExport {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      background: white;
      padding: 18px;
      border-radius: 14px;
    }

    .result-title-pdf {
      font-size: 18px;
      font-weight: 700;
      color: #581c87;
      margin-bottom: 4px;
    }

    .result-subtitle-pdf {
      font-size: 12px;
      color: #7e22ce;
      margin-bottom: 14px;
    }

    .pdf-divider {
      height: 1px;
      background: #f3e8ff;
      margin: 14px 0;
    }

    .summary-box {
      margin-bottom: 1rem;
      padding: 12px;
      border: 1px solid #e9d5ff;
      border-radius: 12px;
      background: #faf5ff;
    }

    .summary-title {
      font-size: 13px;
      font-weight: 600;
      color: #7e22ce;
      margin-bottom: 8px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 12px;
      color: #374151;
    }

    .summary-grid strong {
      color: #111827;
    }

    .warning-box {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      color: #92400e;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .warning-box strong {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .warning-box ul {
      margin-left: 18px;
    }

    .prediction-main {
      text-align: center;
      margin: 14px 0 8px;
    }

    .prediction-title {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .prediction-badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
      border: 1px solid;
    }

    .prediction-stay {
      background: #d1fae5;
      color: #065f46;
      border-color: #6ee7b7;
    }

    .prediction-leave {
      background: #fce7f3;
      color: #9d174d;
      border-color: #f9a8d4;
    }

    .risk-note {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    .gauge-container {
      text-align: center;
      margin: 18px 0 18px;
    }

    .donut-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .donut-svg {
      display: block;
    }

    .donut-bg {
      fill: none;
      stroke: #f3e8ff;
      stroke-width: 14;
    }

    .donut-progress {
      fill: none;
      stroke-width: 14;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 80px 80px;
    }

    .donut-center {
      font-size: 24px;
      font-weight: 700;
      fill: #111827;
    }

    .donut-sub {
      font-size: 12px;
      fill: #6b7280;
    }

    .prob-label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }

    .prob-section {
      width: 100%;
      margin-bottom: 1rem;
    }

    .prob-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .prob-row span:last-child {
      font-weight: 600;
      color: #1a1a2e;
    }

    .prob-bar-wrap {
      width: 100%;
      height: 9px;
      background: #f3e8ff;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .prob-bar {
      height: 100%;
      border-radius: 999px;
    }

    .rec-title {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .rec-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .rec-item.pink {
      background: #fdf2f8;
      border: 1px solid #f3b8e9;
    }

    .rec-item.green {
      background: #f0fdf4;
      border: 1px solid #86efac;
    }

    .rec-item.lila {
      background: #f5f3ff;
      border: 1px solid #c4b5fd;
    }

    .rec-item i {
      font-size: 18px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .rec-item.pink i {
      color: #be185d;
    }

    .rec-item.green i {
      color: #15803d;
    }

    .rec-item.lila i {
      color: #6d28d9;
    }

    .rec-item strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .rec-item span {
      font-size: 12px;
      color: #6b7280;
    }

    .btn-clear {
        width: 100%;
        margin-top: 10px;
        padding: 11px;
        background: #f3e8ff;
        border: 1px solid #d8b4fe;
        border-radius: 10px;
        color: #581c87;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.15s, transform 0.1s;
    }

    .btn-clear:hover {
        background: #e9d5ff;
    }

    .btn-clear:active {
        transform: scale(0.98);
    }

  </style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="header-icon">
      <i class="ti ti-users"></i>
    </div>

    <div>
      <div class="header-title">Predictor de Retención de Empleados</div>
      <div class="header-sub">Predice la probabilidad de que un empleado abandone la empresa</div>
    </div>
  </div>

  <div class="grid">

    <div class="panel">
      <div class="panel-title">Variables del perfil del empleado</div>

      <div class="fields-grid">
        <div class="field">
          <label>Educación</label>
          <select id="education">
            <option value="0">Licenciatura (Bachelors)</option>
            <option value="1">Maestría (Masters)</option>
            <option value="2">Doctorado (PHD)</option>
          </select>
        </div>

        <div class="field">
          <label>Año de ingreso</label>
          <input type="number" id="joiningYear" value="2012" />
        </div>

        <div class="field">
          <label>Ciudad</label>
          <select id="city">
            <option value="Bangalore">Bangalore</option>
            <option value="New Delhi">New Delhi</option>
            <option value="Pune">Pune</option>
          </select>
        </div>

        <div class="field">
          <label>Nivel Salarial</label>
          <select id="paymentTier">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
          </select>
        </div>

        <div class="field">
          <label>Edad</label>
          <input type="number" id="age" value="30" />
        </div>

        <div class="field">
          <label>Género</label>
          <select id="gender">
            <option value="0">Femenino</option>
            <option value="1">Masculino</option>
          </select>
        </div>

        <div class="field">
          <label>¿Alguna vez sin proyecto?</label>
          <select id="everBenched">
            <option value="0">No</option>
            <option value="1">Si</option>
          </select>
        </div>

        <div class="field">
          <label>Años de experiencia</label>
          <input type="number" id="experience" value="3" />
        </div>
      </div>

      <button class="btn-run" id="btnRun" onclick="runPrediction()">
        <i class="ti ti-cpu"></i> Predicción
      </button>

      <button class="btn-clear" id="btnClear" onclick="clearForm()">
        <i class="ti ti-refresh"></i> Limpiar
        </button>

      <button class="btn-pdf" id="btnPdf" onclick="downloadPDF()">
        <i class="ti ti-file-download"></i> Descargar PDF
      </button>
    </div>

    <div class="panel result-panel">
      <div class="panel-title">Predicción de Permanencia</div>

      <div id="resultContent">
        <div class="placeholder">
          <i class="ti ti-arrow-left"></i> Ingresa los datos y presiona "Predicción"
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  let lastEmployeeData = null;
  let lastPredictionResult = null;

  async function runPrediction() {
    const btn = document.getElementById('btnRun');

    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader"></i> Analizando...';

    document.getElementById('resultContent').innerHTML =
      '<div class="placeholder"><i class="ti ti-loader"></i> Procesando predicción...</div>';

    document.getElementById("btnPdf").style.display = "none";

    const education = parseInt(document.getElementById('education').value);
    const city = document.getElementById('city').value;
    const paymentTier = parseInt(document.getElementById('paymentTier').value);
    const gender = parseInt(document.getElementById('gender').value);
    const everBenched = parseInt(document.getElementById('everBenched').value);

    const joiningYear = parseInt(document.getElementById('joiningYear').value);
    const age = parseInt(document.getElementById('age').value);
    const experience = parseInt(document.getElementById('experience').value);

    if (isNaN(joiningYear) || joiningYear <= 0) {
      showError("Joining Year debe ser un número mayor a 0.");
      resetButton(btn);
      return;
    }

    if (isNaN(age) || age <= 0) {
      showError("Age debe ser un número mayor a 0.");
      resetButton(btn);
      return;
    }

    if (isNaN(experience) || experience < 0) {
      showError("Experience debe ser un número igual o mayor a 0.");
      resetButton(btn);
      return;
    }

    const employeeData = {
      Education: education,
      JoiningYear: joiningYear,
      City: city,
      PaymentTier: paymentTier,
      Age: age,
      Gender: gender,
      EverBenched: everBenched,
      ExperienceInCurrentDomain: experience
    };

    lastEmployeeData = employeeData;

    try {
      const res = await fetch("/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(employeeData)
      });

      const result = await res.json();

      if (!res.ok) {
        showError(result.error || "Ocurrió un error al hacer la predicción.");
        resetButton(btn);
        return;
      }

      renderResult(result);

    } catch (error) {
      showError("No se pudo conectar con Flask. Revisa que app.py esté ejecutándose.");
    }

    resetButton(btn);
  }

  function resetButton(btn) {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-cpu"></i> Predicción';
  }

  function showError(message) {
    document.getElementById('resultContent').innerHTML =
      `<div class="placeholder" style="color:#dc2626;">${message}</div>`;
  }

  function buildWarningsHtml(warnings) {
    if (!warnings || warnings.length === 0) {
      return "";
    }

    const items = warnings.map(w => `<li>${w}</li>`).join("");

    return `
      <div class="warning-box">
        <strong>¡Advertencia!</strong>
        <ul>${items}</ul>
      </div>
    `;
  }

  function renderResult(r) {
  lastPredictionResult = r;
  document.getElementById("btnPdf").style.display = "flex";

  // Probabilidades numéricas, sin redondear a entero
  const probLeaveNum = r.prob_leave * 100;
  const probStayNum = r.prob_stay * 100;

  // Texto con 2 decimales
  const probLeaveText = probLeaveNum.toFixed(2);
  const probStayText = probStayNum.toFixed(2);

  const leaving = r.prediction === 1;

  const predictionText = leaving ? "Se va" : "Se queda";
  const predictionClass = leaving ? "prediction-leave" : "prediction-stay";

  const dominantPercentNum = leaving ? probLeaveNum : probStayNum;
  const dominantPercentText = dominantPercentNum.toFixed(2);
  const dominantLabel = leaving ? "Se va" : "Se queda";

  const riskLabel = leaving
    ? (probLeaveNum > 70 ? "Alto Riesgo" : "Riesgo Medio")
    : "Bajo Riesgo";

  const gaugeColor = leaving
    ? (probLeaveNum > 70 ? "#ec4899" : "#f59e0b")
    : "#10b981";

  const factors = r.main_factors || [];
  const warningsHtml = buildWarningsHtml(r.warnings);

  const recColors = ['pink', 'green', 'lila'];
  const recIcons = ['ti-message-circle', 'ti-currency-dollar', 'ti-arrows-exchange'];

  const recTitles = leaving
    ? ['Entrevista de Permanencia', 'Revisar Compensación', 'Plan de Crecimiento']
    : ['Seguimiento Periódico', 'Mantener Condiciones', 'Reconocimiento'];

  const recsHtml = factors.map((f, i) => `
    <div class="rec-item ${recColors[i] || 'lila'}">
      <i class="ti ${recIcons[i] || 'ti-info-circle'}"></i>
      <div>
        <strong>${recTitles[i] || 'Recomendación'}</strong>
        <span>${f}</span>
      </div>
    </div>
  `).join('');

  const educationText = ["Licenciatura (Bachelors)", "Maestría (Masters)", "Doctorado (PHD)"][lastEmployeeData.Education];
  const genderText = lastEmployeeData.Gender === 1 ? "Masculino" : "Femenino";
  const benchedText = lastEmployeeData.EverBenched === 1 ? "Sí" : "No";

  const radius = 54;
  const circumference = 2 * Math.PI * radius;
  const strokeOffset = circumference * (1 - dominantPercentNum / 100);

  document.getElementById('resultContent').innerHTML = `
    <div id="reportExport">

      <div class="result-title-pdf">Reporte Predictivo</div>
      <div class="result-subtitle-pdf">Resumen de Predicción de Abandono</div>

      ${warningsHtml}

      <div class="summary-box">
        <div class="summary-title">Resumen de Datos del Empleado</div>

        <div class="summary-grid">
          <div><strong>Educación:</strong> ${educationText}</div>
          <div><strong>Año de Ingreso:</strong> ${lastEmployeeData.JoiningYear}</div>
          <div><strong>Ciudad:</strong> ${lastEmployeeData.City}</div>
          <div><strong>Nivel Salarial:</strong> ${lastEmployeeData.PaymentTier}</div>
          <div><strong>Edad:</strong> ${lastEmployeeData.Age}</div>
          <div><strong>Género:</strong> ${genderText}</div>
          <div><strong>¿Alguna vez sin proyecto?</strong> ${benchedText}</div>
          <div><strong>Experiencia:</strong> ${lastEmployeeData.ExperienceInCurrentDomain}</div>
        </div>
      </div>

      <div class="pdf-divider"></div>

      <div class="prediction-main">
        <div class="prediction-title">Predicción Principal</div>
        <span class="prediction-badge ${predictionClass}">${predictionText}</span>
        <div class="risk-note">Nivel de riesgo: ${riskLabel}</div>
      </div>

      <div class="gauge-container">
        <div class="donut-wrap">
          <svg class="donut-svg" width="160" height="160" viewBox="0 0 160 160">
            <circle class="donut-bg" cx="80" cy="80" r="${radius}"></circle>

            <circle
              class="donut-progress"
              cx="80"
              cy="80"
              r="${radius}"
              stroke="${gaugeColor}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${strokeOffset}">
            </circle>

            <text x="80" y="76" text-anchor="middle" class="donut-center">${dominantPercentText}%</text>
            <text x="80" y="102" text-anchor="middle" class="donut-sub">${dominantLabel}</text>
          </svg>
        </div>

        <p class="prob-label">Probabilidad más alta</p>
      </div>

      <div class="prob-section">
        <div class="prob-row">
          <span>Se queda</span>
          <span>${probStayText}%</span>
        </div>

        <div class="prob-bar-wrap">
          <div class="prob-bar" style="width:${probStayNum}%; background:#10b981;"></div>
        </div>

        <div class="prob-row">
          <span>Se va</span>
          <span>${probLeaveText}%</span>
        </div>

        <div class="prob-bar-wrap">
          <div class="prob-bar" style="width:${probLeaveNum}%; background:#ec4899;"></div>
        </div>
      </div>

      <div>
        <div class="rec-title">Recomendaciones estratégicas</div>
        ${recsHtml}
      </div>
    </div>
  `;
}

  async function downloadPDF() {
  const { jsPDF } = window.jspdf;

  if (!lastEmployeeData || !lastPredictionResult) {
    alert("Primero genera una predicción antes de descargar el PDF.");
    return;
  }

  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const margin = 10;
  const contentWidth = pageWidth - margin * 2;

  const probLeaveNum = lastPredictionResult.prob_leave * 100;
  const probStayNum = lastPredictionResult.prob_stay * 100;

  const probLeaveText = probLeaveNum.toFixed(2);
  const probStayText = probStayNum.toFixed(2);

  const leaving = lastPredictionResult.prediction === 1;

  const predictionText = leaving ? "Se va" : "Se queda";
  const dominantPercentNum = leaving ? probLeaveNum : probStayNum;
  const dominantPercentText = dominantPercentNum.toFixed(2);
  const dominantLabel = leaving ? "Se va" : "Se queda";

  const riskLabel = leaving
  ? (probLeaveNum > 70 ? "Alto Riesgo" : "Riesgo Medio")
  : "Bajo Riesgo";

  const educationText = ["Licenciatura (Bachelors)", "Maestría (Masters)", "Doctorado (PHD)"][lastEmployeeData.Education];
  const genderText = lastEmployeeData.Gender === 1 ? "Masculino" : "Femenino";
  const benchedText = lastEmployeeData.EverBenched === 1 ? "Si" : "No";

  const recommendations = lastPredictionResult.main_factors || [];
  const warnings = lastPredictionResult.warnings || [];

  let y = 10;

  // Funciones Auxiliares

  function sectionTitle(text, posY) {
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(11);
    pdf.setTextColor(156, 163, 175);
    pdf.text(text.toUpperCase(), margin, posY);
  }

  function drawRoundedBox(x, y, w, h, fillColor, borderColor) {
    pdf.setFillColor(...fillColor);
    pdf.setDrawColor(...borderColor);
    pdf.roundedRect(x, y, w, h, 4, 4, "FD");
  }

  function drawProgressBar(label, value, color, posY) {
    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(10);
    pdf.setTextColor(75, 85, 99);

    pdf.text(label, margin, posY);
    pdf.text(`${value.toFixed(2)}%`, pageWidth - margin, posY, { align: "right" });

    const barY = posY + 3;
    const barWidth = contentWidth;
    const barHeight = 4;

    // Fondo
    pdf.setFillColor(243, 232, 255);
    pdf.roundedRect(margin, barY, barWidth, barHeight, 2, 2, "F");

    // Progreso
    pdf.setFillColor(...color);
    pdf.roundedRect(margin, barY, barWidth * (value / 100), barHeight, 2, 2, "F");
  }

  function recommendationTitle(index, leaving) {
    if (index === 0) return leaving ? "Entrevista de Permanencia" : "Seguimiento Periódico";
    if (index === 1) return leaving ? "Revisar Compensación" : "Mantener Condiciones";
    return leaving ? "Plan de Crecimiento" : "Reconocimiento";
  }

  function recommendationColors(index) {
    if (index === 0) {
      return {
        fill: [253, 242, 248],
        border: [243, 184, 233]
      };
    }
    if (index === 1) {
      return {
        fill: [240, 253, 244],
        border: [134, 239, 172]
      };
    }
    return {
      fill: [245, 243, 255],
      border: [196, 181, 253]
    };
  }


  // Encabezado

  drawRoundedBox(margin, y, contentWidth, 20, [243, 232, 255], [216, 180, 254]);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(15);
  pdf.setTextColor(88, 28, 135);
  pdf.text("Reporte Predictivo", margin + 8, y + 8);

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(9);
  pdf.setTextColor(126, 34, 206);
  pdf.text("Resumen de Predicción de Abandono del Empleado", margin + 8, y + 14);

  y += 28;

// Resumen

  drawRoundedBox(margin, y, contentWidth, 40, [250, 245, 255], [233, 213, 255]);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(11);
  pdf.setTextColor(126, 34, 206);
  pdf.text("Resumen de Datos del Empleado", margin + 6, y + 8);

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(9);
  pdf.setTextColor(55, 65, 81);

  const leftX = margin + 6;
  const rightX = margin + 105;

  pdf.text(`Educación: ${educationText}`, leftX, y + 16);
  pdf.text(`Año de Ingreso: ${lastEmployeeData.JoiningYear}`, rightX, y + 16);

  pdf.text(`Ciudad: ${lastEmployeeData.City}`, leftX, y + 23);
  pdf.text(`Nivel Salarial: ${lastEmployeeData.PaymentTier}`, rightX, y + 23);

  pdf.text(`Edad: ${lastEmployeeData.Age}`, leftX, y + 30);
  pdf.text(`Género: ${genderText}`, rightX, y + 30);

  pdf.text(`¿Alguna vez sin proyecto? ${benchedText}`, leftX, y + 37);
  pdf.text(`Experiencia: ${lastEmployeeData.ExperienceInCurrentDomain}`, rightX, y + 37);

  y += 50;

// Advertencias

  if (warnings.length > 0) {
    let warningHeight = 14;

    warnings.forEach(w => {
      const lines = pdf.splitTextToSize(`• ${w}`, 170);
      warningHeight += lines.length * 4.5;
    });

    drawRoundedBox(margin, y, contentWidth, warningHeight, [254, 243, 199], [252, 211, 77]);

    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(10);
    pdf.setTextColor(146, 64, 14);
    pdf.text("Advertencia", margin + 6, y + 7);

    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(8.5);

    let wy = y + 13;
    warnings.forEach(w => {
      const lines = pdf.splitTextToSize(`• ${w}`, 172);
      pdf.text(lines, margin + 6, wy);
      wy += lines.length * 4.5 + 1;
    });

    y += warningHeight + 8;
  }

 // Predicción Principal

  sectionTitle("Predicción Principal", y);
  y += 6;

  // Caja izquierda: predicción
  const leftBoxX = margin;
  const leftBoxY = y;
  const leftBoxW = 88;
  const leftBoxH = 26;

  const predFill = leaving ? [252, 231, 243] : [209, 250, 229];
  const predBorder = leaving ? [249, 168, 212] : [110, 231, 183];
  const predText = leaving ? [157, 23, 77] : [6, 95, 70];

  drawRoundedBox(leftBoxX, leftBoxY, leftBoxW, leftBoxH, predFill, predBorder);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(10);
  pdf.setTextColor(107, 114, 128);
  pdf.text("Predicción", leftBoxX + 6, leftBoxY + 8);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(16);
  pdf.setTextColor(...predText);
  pdf.text(predictionText, leftBoxX + 6, leftBoxY + 18);

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(9);
  pdf.setTextColor(75, 85, 99);
  pdf.text(`Nivel de Riesgo: ${riskLabel}`, leftBoxX + 40, leftBoxY + 18);

  // Caja derecha: porcentaje dominante
  const rightBoxX = margin + 95;
  const rightBoxY = y;
  const rightBoxW = contentWidth - 95;
  const rightBoxH = 26;

  drawRoundedBox(rightBoxX, rightBoxY, rightBoxW, rightBoxH, [255, 255, 255], [233, 213, 255]);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(10);
  pdf.setTextColor(107, 114, 128);
  pdf.text("Mayor Probabilidad", rightBoxX + 6, rightBoxY + 8);

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(18);
  pdf.setTextColor(17, 24, 39);
  pdf.text(`${dominantPercentText}%`, rightBoxX + 6, rightBoxY + 18);

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(9);
  pdf.setTextColor(75, 85, 99);
  pdf.text(dominantLabel, rightBoxX + 30, rightBoxY + 18);

  y += 36;

  // Probabilidades

  sectionTitle("Desglose de Probabilidades", y);
  y += 8;

  drawProgressBar("Se queda", probStayNum, [16, 185, 129], y);
  y += 16;

  drawProgressBar("Se va", probLeaveNum, [236, 72, 153], y);
  y += 18;

  // Recomendaciones

  sectionTitle("Recomendaciones Estratégicas", y);
  y += 8;

  recommendations.forEach((rec, index) => {
    const title = recommendationTitle(index, leaving);
    const colors = recommendationColors(index);

    const lines = pdf.splitTextToSize(rec, 175);
    const boxHeight = 12 + lines.length * 4.5;

    if (y + boxHeight > 280) {
      pdf.addPage();
      y = 15;
      sectionTitle("Recomendaciones Estratégicas", y);
      y += 8;
    }

    drawRoundedBox(margin, y, contentWidth, boxHeight, colors.fill, colors.border);

    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(9.5);
    pdf.setTextColor(17, 24, 39);
    pdf.text(title, margin + 6, y + 7);

    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(8.5);
    pdf.setTextColor(107, 114, 128);
    pdf.text(lines, margin + 6, y + 13);

    y += boxHeight + 6;
  });

  // Pie de página

  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(8);
  pdf.setTextColor(156, 163, 175);
  pdf.text(`Generado en: ${new Date().toLocaleString()}`, margin, 288);

  pdf.save("Reporte_Empleado.pdf");
}

function clearForm() {
  // Regresar selects a valores iniciales
  document.getElementById('education').value = "0";
  document.getElementById('city').value = "Bangalore";
  document.getElementById('paymentTier').value = "3";
  document.getElementById('gender').value = "0";
  document.getElementById('everBenched').value = "0";

  // Regresar inputs numéricos a valores iniciales
  document.getElementById('joiningYear').value = "2016";
  document.getElementById('age').value = "30";
  document.getElementById('experience').value = "3";

  // Limpiar resultado
  document.getElementById('resultContent').innerHTML = `
    <div class="placeholder">
      <i class="ti ti-arrow-left"></i> Ingresa los datos y presiona "Predicción"
    </div>
  `;

  // Ocultar botón PDF
  document.getElementById("btnPdf").style.display = "none";

  // Limpiar variables guardadas
  lastEmployeeData = null;
  lastPredictionResult = null;
}
</script>
</body>
</html>
